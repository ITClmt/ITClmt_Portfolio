name: CV PDF to WebP

on:
  push:
    branches: [main]
    paths:
      - "public/CV*.pdf"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install poppler-utils and imagemagick
        run: sudo apt-get update && sudo apt-get install -y poppler-utils imagemagick

      - name: Convert CV PDFs to WebP
        run: bash scripts/pdf-to-webp.sh

      - name: Commit and push generated WebP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/*.webp
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate CV webp from PDF"
            git push
          fi
